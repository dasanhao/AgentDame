name: News Agent

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run DeepSeek Agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python agent_deepseek.py
      - name: Commit output
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f output/
          git diff --staged --quiet || git commit -m "Auto: news output $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push https://x-access-token:${GH_TOKEN}@github.com/dasanhao/AgentDame.git HEAD:main
